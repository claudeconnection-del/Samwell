services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    group_add:
      - "0"
    # image: ghcr.io/danny-avila/librechat:latest               commented out to swap image to build
    container_name: samwell-librechat
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
      - meilisearch
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - CREDS_KEY=${CREDS_KEY}
      - CREDS_IV=${CREDS_IV}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ALLOW_REGISTRATION=true
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - GITHUB_PAT=${GITHUB_PAT}
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volumes/shared-data:/data
      - uv_cache:/root/.cache/uv
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: samwell-mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: samwell-meilisearch
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

  postgres-db:
    image: postgres:16
    container_name: samwell-postgres
    networks:
      default:
        ipv4_address: 172.18.0.10
    environment:
      POSTGRES_USER: samwell
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: samwell_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samwell -d samwell_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-postgres:
    image: crystaldba/postgres-mcp:latest
    container_name: samwell-mcp-postgres
    command: ["--transport=sse", "--access-mode=restricted"]
    environment:
      DATABASE_URI: "postgresql://samwell:${POSTGRES_PASSWORD}@172.18.0.10:5432/samwell_db"
    extra_hosts:
      - "postgres-db:172.18.0.10"
    ports:
      - "8001:8000"
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: samwell-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mcp-qdrant:
    build:
      context: ./config/mcp/qdrant
      args:
        HF_TOKEN: ${HF_TOKEN}
    container_name: samwell-mcp-qdrant
    environment:
      QDRANT_URL: "http://qdrant:6333"
      COLLECTION_NAME: "samwell-memory"
      FASTEMBED_CACHE_PATH: "/opt/fastembed_cache"
      FASTMCP_SERVER_HOST: "0.0.0.0"
    ports:
      - "8002:8000"
    depends_on:
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-e", "import urllib.request; urllib.request.urlopen('https://localhost:8000/sse')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s


networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  meilisearch_data:
  mongodb_data:
  postgres_data:
  qdrant_data:
  uv_cache: