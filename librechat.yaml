version: 1.2.1

cache: true

endpoints:
  custom:
    - name: "Ollama"
      apiKey: "ollama"
      baseURL: "http://host.docker.internal:11434/v1/"
      models:
        default:
          - "llama3.2:3b"
        fetch: true
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      modelDisplayLabel: "Ollama"
      