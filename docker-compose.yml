services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    group_add:
      - "0"
    # image: ghcr.io/danny-avila/librechat:latest               commented out to swap image to build
    container_name: samwell-librechat
    ports:
      - "3080:3080"
    depends_on:
      mongodb:
        condition: service_started
      meilisearch:
        condition: service_started
      mcp-qdrant:
        condition: service_healthy
      mcp-postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - CREDS_KEY=${CREDS_KEY}
      - CREDS_IV=${CREDS_IV}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ALLOW_REGISTRATION=true
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - GITHUB_PAT=${GITHUB_PAT}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_LOG=DEBUG
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volumes/shared-data:/data
      - uv_cache:/root/.cache/uv
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: samwell-mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: samwell-meilisearch
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

  postgres-db:
    image: postgres:16
    container_name: samwell-postgres
    networks:
      default:
        ipv4_address: 172.18.0.10
    environment:
      POSTGRES_USER: samwell
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: samwell_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samwell -d samwell_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-postgres:
    image: crystaldba/postgres-mcp:latest
    container_name: samwell-mcp-postgres
    command: ["--transport=sse", "--access-mode=restricted"]
    environment:
      DATABASE_URI: "postgresql://samwell:${POSTGRES_PASSWORD}@172.18.0.10:5432/samwell_db"
    extra_hosts:
      - "postgres-db:172.18.0.10"
    ports:
      - "8079:8000"
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8000)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: samwell-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mcp-qdrant:
    build:
      context: ./config/mcp/qdrant
      args:
        HF_TOKEN: ${HF_TOKEN}
    container_name: samwell-mcp-qdrant
    environment:
      QDRANT_URL: "http://qdrant:6333"
      COLLECTION_NAME: "samwell-memory"
      FASTEMBED_CACHE_PATH: "/opt/fastembed_cache"
      FASTMCP_SERVER_HOST: "0.0.0.0"
    ports:
      - "8080:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8000)); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  redis:
    image: redis:7-alpine
    container_name: samwell-redis
    restart: unless-stopped

  langfuse-web:
    image: langfuse/langfuse:2
    container_name: samwell-langfuse-web
    depends_on:
      - postgres-db
      - redis
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: "postgresql://samwell:${POSTGRES_PASSWORD}@172.18.0.10:5432/langfuse"
      NEXTAUTH_SECRET: "${LANGFUSE_SECRET_KEY}"
      SALT: "${LANGFUSE_SALT}"
      NEXTAUTH_URL: "http://localhost:3001"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: samwell-litellm
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY}"
      LANGFUSE_HOST: "http://langfuse-web:3000"
      DATABASE_URL: "postgresql://samwell:${POSTGRES_PASSWORD}@172.18.0.10:5432/langfuse"
      STORE_MODEL_IN_DB: "False"
      DISABLE_SPEND_LOGS: "True"
    volumes:
      - ./config/litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml"]
    depends_on:
      - langfuse-web
    restart: unless-stopped

  mcp-sandbox:
    build:
      context: ./config/mcp/sandbox
    container_name: samwell-mcp-sandbox
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8004:8000"
    restart: unless-stopped

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  meilisearch_data:
  mongodb_data:
  postgres_data:
  qdrant_data:
  uv_cache: