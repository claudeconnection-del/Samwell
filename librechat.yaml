version: 1.3.5

cache: true

mcpSettings:
  allowedDomains:
    - "mcp-postgres"
    - "host.docker.internal"
    - "mcp-qdrant"
    - "samwell-mcp-mslearn"
    - "https://learn.microsoft.com"

mcpServers:
  filesystem:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /data
    timeout: 30000

  brave-search:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-brave-search"
    env:
      BRAVE_API_KEY: "${BRAVE_API_KEY}"
    timeout: 30000

  github:
    command: docker
    args:
      - run
      - -i
      - --rm
      - -e
      - GITHUB_PERSONAL_ACCESS_TOKEN
      - -e
      - GITHUB_TOOLSETS
      - ghcr.io/github/github-mcp-server
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PAT}"
      GITHUB_TOOLSETS: "repos,issues,pull_requests,code_security"
    timeout: 60000
    initTimeout: 30000

  postgres:
    type: sse
    url: "http://mcp-postgres:8000/sse"
    timeout: 30000
    initTimeout: 15000

# Uncomment for macOS
  code-sandbox:
    command: docker  
    args:
      - run
      - -i
      - --rm
      - --user
      - root
      - -v
      - /var/run/docker.sock:/var/run/docker.sock
      - -e
      - SANDBOX_MEMORY_LIMIT
      - -e
      - SANDBOX_CPU_LIMIT
      - -e
      - SANDBOX_TIMEOUT
      - -e
      - SANDBOX_IDLE_TIMEOUT
      - -e
      - DOCKER_API_VERSION
      - mcp/node-code-sandbox
    env:
      SANDBOX_MEMORY_LIMIT: "1024m"
      SANDBOX_CPU_LIMIT: "0.75"
      SANDBOX_TIMEOUT: "15000"
      SANDBOX_IDLE_TIMEOUT: "300"
      DOCKER_API_VERSION: "1.47"
    timeout: 30000

#  Uncomment for Windows/WSL
#   code-sandbox:
#     command: docker
#     args:
#       - run
#       - -i
#       - --rm
#       - --user
#       - root
#       - --add-host
#       - host.docker.internal:host-gateway
#       - -e
#       - SANDBOX_MEMORY_LIMIT
#       - -e
#       - SANDBOX_CPU_LIMIT
#       - -e
#       - SANDBOX_TIMEOUT
#       - -e
#       - DOCKER_HOST
#       - -e
#       - DOCKER_API_VERSION
#       - mcp/node-code-sandbox
#     env:
#       SANDBOX_MEMORY_LIMIT: "512m"
#       SANDBOX_CPU_LIMIT: "0.75"
#       SANDBOX_TIMEOUT: "15000"
#       SANDBOX_IDLE_TIMEOUT: "300"
#       DOCKER_HOST: "tcp://host.docker.internal:2375"
#       DOCKER_API_VERSION: "1.47"
#     timeout: 30000

  qdrant:
    type: sse
    url: "http://mcp-qdrant:8000/sse"
    timeout: 60000
    initTimeout: 30000

  time:
    command: docker
    args:
      - run
      - -i
      - --rm
      - ghcr.io/astral-sh/uv:python3.12-bookworm-slim
      - uvx
      - mcp-server-time
    timeout: 30000
    initTimeout: 15000

  mslearn:
    type: streamable-http
    url: https://learn.microsoft.com/api/mcp

# swap default models order for more powerful machines
endpoints:
  custom:
    - name: "Ollama"
      maxContextTokens: 8192
      apiKey: "ollama"
      baseURL: "http://host.docker.internal:11434/v1/"
      requestTimeout: 300000
      addParams:
        chat_template_kwargs:
          thinking: false
      models:
        default:
          - "qwen3:32b-q4_K_M"
          - "qwen3:8b"
          - "llama3:70b"
        fetch: true
      titleConvo: false
      titleModel: "current_model"
      summarize: false
      modelDisplayLabel: "Ollama"

    - name: "Ollama (Traced)"
      apiKey: "${LITELLM_MASTER_KEY}"
      baseURL: "http://litellm:4000/v1/"
      requestTimeout: 300000
      models:
        default:
          - qwen3:8b
          - qwen3:32b-q4_K_M
          - llama
        fetch: false
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      modelDisplayLabel: "Ollama (Traced)"

interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true